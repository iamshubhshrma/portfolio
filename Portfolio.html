<!doctype html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Fixed UI chrome -->
  <div class="grain" aria-hidden="true"></div>
  <div class="cursor-blob" id="cursorBlob" aria-hidden="true"></div>
  <div class="scroll-progress" aria-hidden="true"><span id="progressBar"></span></div>

  <header class="top-bar">
    <div class="masthead">
      <span class="mast-mark">◐</span>
      <span class="mast-id">SHUBHAM / S.</span>
    </div>
    <nav class="top-nav">
      <a href="#cover">00 · cover</a>
      <a href="#profile">01 · profile</a>
      <a href="#stack">02 · stack</a>
      <a href="#casework">03 · casework</a>
      <a href="#practice">04 · practice</a>

      <span>VOL.&nbsp;01</span>
      <span class="dot">•</span>
      <span>EDITION 2026</span>
    </div>
  </header>

  <aside class="side-rail left" aria-hidden="true">
    <span>S/S</span>
    <span class="rule"></span>
    <span>BHOPAL · 23.25°N</span>
  </aside>
  <aside class="side-rail right" aria-hidden="true">
    <span id="sectionTag">§ 00 — COVER</span>
    <span class="rule"></span>
    <span id="scrollPct">000%</span>
  </aside>

  <main id="reel">
    <!-- Sections injected via JSX so we can keep scroll/animation wiring tidy -->
    <div id="app"></div>
  </main>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
